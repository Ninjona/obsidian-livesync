name: Build And Publish Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - deploy/docker/couchdb/**
      - deploy/docker/couchdb-init/**
      - .github/workflows/docker-images.yml

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Resolve source SHA
        shell: bash
        run: echo "IMAGE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CouchDB image
        uses: docker/build-push-action@v6
        with:
          context: deploy/docker/couchdb
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/obsidian-livesync-couchdb:latest
            ghcr.io/${{ github.repository_owner }}/obsidian-livesync-couchdb:${{ env.IMAGE_SHA }}

      - name: Build and push init image
        uses: docker/build-push-action@v6
        with:
          context: deploy/docker/couchdb-init
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/obsidian-livesync-couchdb-init:latest
            ghcr.io/${{ github.repository_owner }}/obsidian-livesync-couchdb-init:${{ env.IMAGE_SHA }}
