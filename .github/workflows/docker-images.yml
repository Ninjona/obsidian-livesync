name: Build And Publish Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - deploy/docker/couchdb/**
      - deploy/docker/couchdb-init/**
      - deploy/docker/backup/**
      - .github/workflows/docker-images.yml

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: ${{ vars.DOCKERHUB_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Resolve source SHA
        shell: bash
        run: |
          echo "IMAGE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "DOCKERHUB_REPO=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CouchDB image
        uses: docker/build-push-action@v6
        with:
          context: deploy/docker/couchdb
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}/obsidian-livesync-couchdb:latest
            ${{ env.DOCKERHUB_REPO }}/obsidian-livesync-couchdb:${{ env.IMAGE_SHA }}

      - name: Build and push init image
        uses: docker/build-push-action@v6
        with:
          context: deploy/docker/couchdb-init
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}/obsidian-livesync-couchdb-init:latest
            ${{ env.DOCKERHUB_REPO }}/obsidian-livesync-couchdb-init:${{ env.IMAGE_SHA }}

      - name: Build and push backup image
        uses: docker/build-push-action@v6
        with:
          context: deploy/docker/backup
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}/obsidian-livesync-couchdb-backup:latest
            ${{ env.DOCKERHUB_REPO }}/obsidian-livesync-couchdb-backup:${{ env.IMAGE_SHA }}
