services:
  couchdb:
    image: ninjona8777/obsidian-livesync-couchdb:latest
    container_name: obsidian-livesync-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER:?set in .env}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?set in .env}
      ERL_FLAGS: "-setcookie ${ERLANG_COOKIE:?set in .env}"
    volumes:
      - couchdb-data:/opt/couchdb/data
    ports:
      - "${COUCHDB_PORT:-5984}:5984"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if command -v curl >/dev/null 2>&1; then code=$$(curl -s -o /dev/null -w ''%{http_code}'' http://127.0.0.1:5984/_up); [ "$$code" = "200" ] || [ "$$code" = "401" ]; elif command -v wget >/dev/null 2>&1; then wget --server-response --spider http://127.0.0.1:5984/_up 2>&1 | grep -Eq "HTTP/[0-9.]+ (200|401)"; else exit 1; fi',
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

# ---
# Caddy reverse proxy (uncomment to enable HTTPS and domain proxying)
#
# caddy:
#   image: caddy:2.10
#   container_name: obsidian-livesync-caddy
#   restart: unless-stopped
#   ports:
#     - "80:80"
#     - "443:443"
#   environment:
#     DOMAIN: ${DOMAIN:?set in .env}
#     ACME_EMAIL: ${ACME_EMAIL:?set in .env}
#   volumes:
#     - ./deploy/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
#     - caddy-data:/data
#     - caddy-config:/config
#   depends_on:
#     couchdb-init:
#       condition: service_completed_successfully

  couchdb-init:
    image: ninjona8777/obsidian-livesync-couchdb-init:latest
    container_name: obsidian-livesync-couchdb-init
    restart: "no"
    environment:
      hostname: http://couchdb:5984
      admin_username: ${COUCHDB_USER:?set in .env}
      admin_password: ${COUCHDB_PASSWORD:?set in .env}
      node: _local
      JWT_ENABLED: ${JWT_ENABLED:-false}
      JWT_ALG: ${JWT_ALG:-hmac}
      JWT_KID: ${JWT_KID:-_default}
      JWT_KEY: ${JWT_KEY:-}
      JWT_USERNAME_CLAIM: ${JWT_USERNAME_CLAIM:-}
      JWT_ROLES_CLAIM: ${JWT_ROLES_CLAIM:-}
      JWT_CLAIMS_REQUIRED: ${JWT_CLAIMS_REQUIRED:-}
      JWT_AUDIENCE_CHECK: ${JWT_AUDIENCE_CHECK:-}
      SETUP_URI_ENABLED: ${SETUP_URI_ENABLED:-true}
      SETUP_URI_HOSTNAME: ${SETUP_URI_HOSTNAME:-}
      SETUP_URI_PORT: ${COUCHDB_PORT:-5984}
      SETUP_URI_DATABASE: ${SETUP_URI_DATABASE:-obsidiannotes}
      SETUP_URI_PASSPHRASE: ${SETUP_URI_PASSPHRASE:-}
      USERS: ${USERS:-}
      FORCE_SETUP_URI: ${FORCE_SETUP_URI:-false}
    depends_on:
      couchdb:
        condition: service_healthy

  backup:
    image: ninjona8777/obsidian-livesync-couchdb-backup:latest
    container_name: obsidian-livesync-backup
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_USER:?set in .env}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?set in .env}
      BACKUP_RETENTION_DAYS: 7
      BACKUP_DIR: /backups
    volumes:
      - backup-data:/backups
    depends_on:
      couchdb:
        condition: service_healthy

volumes:
  couchdb-data:
  backup-data:
  caddy-data:
  caddy-config:
